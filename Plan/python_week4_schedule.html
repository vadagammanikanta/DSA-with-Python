<script>
const days = [
  {
    day: 22, label: "Mon", cls: "d1", topic: "HashMap Basics",
    tasks: ["dict CRUD operations", "O(1) lookup concept", "Frequency counting"],
    detail: {
      goal: "Understand why HashMap is the #1 tool in DSA interviews",
      code: `# Why HashMap? — turn O(n²) into O(n)

# BRUTE FORCE — O(n²)
def twoSum_brute(nums, target):
    for i in range(len(nums)):
        for j in range(i+1, len(nums)):
            if nums[i] + nums[j] == target:
                return [i, j]

# OPTIMAL with HashMap — O(n)
def twoSum(nums, target):
    seen = {}              # val -> index
    for i, n in enumerate(nums):
        diff = target - n
        if diff in seen:
            return [seen[diff], i]
        seen[n] = i

# Basic dict operations — all O(1)
d = {}
d["key"] = "value"        # insert
d.get("key", "default")   # safe get
del d["key"]              # delete
"key" in d                # lookup — O(1)!
d.keys(), d.values(), d.items()

# Frequency count pattern
def freqCount(arr):
    freq = {}
    for x in arr:
        freq[x] = freq.get(x, 0) + 1
    return freq

arr = [1, 2, 2, 3, 3, 3]
print(freqCount(arr))  # {1:1, 2:2, 3:3}`,
      practice: [
        "LeetCode #1 — Two Sum (Easy)",
        "LeetCode #217 — Contains Duplicate (Easy)",
        "LeetCode #169 — Majority Element (Easy)"
      ],
      tip: "Whenever you see O(n²) with nested loops, ask: can a HashMap reduce this to O(n)? Usually yes!"
    }
  },
  {
    day: 23, label: "Tue", cls: "d1", topic: "defaultdict & Counter",
    tasks: ["defaultdict(int/list/set)", "Counter most_common", "Subtract & update"],
    detail: {
      goal: "Master Python's power tools — they cut interview code in half",
      code: `from collections import defaultdict, Counter

# defaultdict(int) — no KeyError, auto 0
freq = defaultdict(int)
for ch in "abracadabra":
    freq[ch] += 1
print(dict(freq))

# defaultdict(list) — group items
def groupAnagrams(strs):
    groups = defaultdict(list)
    for s in strs:
        groups[tuple(sorted(s))].append(s)
    return list(groups.values())

print(groupAnagrams(["eat","tea","tan","ate","nat","bat"]))

# defaultdict(set) — unique grouping
graph = defaultdict(set)
edges = [(1,2),(1,3),(2,4)]
for u, v in edges:
    graph[u].add(v)
    graph[v].add(u)

# Counter
c = Counter("abracadabra")
print(c.most_common(3))   # top 3 frequent
print(c["a"])             # 5

# Counter arithmetic
c1 = Counter("aab")
c2 = Counter("abb")
print(c1 + c2)   # Counter({'a':3,'b':3})
print(c1 - c2)   # Counter({'a':1})
print(c1 & c2)   # intersection (min)
print(c1 | c2)   # union (max)`,
      practice: [
        "LeetCode #49 — Group Anagrams (Medium)",
        "LeetCode #347 — Top K Frequent Elements (Medium)",
        "LeetCode #383 — Ransom Note (Easy)"
      ],
      tip: "defaultdict(list) for grouping, defaultdict(int) for counting. These two patterns cover 80% of HashMap problems."
    }
  },
  {
    day: 24, label: "Wed", cls: "d2", topic: "HashSet Patterns",
    tasks: ["Set for O(1) lookup", "Duplicate detection", "Set operations"],
    detail: {
      goal: "Sets give you O(1) membership check — critical for cycle & duplicate detection",
      code: `# Set — O(1) add, remove, lookup
s = set()
s.add(5)
s.discard(5)    # no error if missing
5 in s          # O(1) — much faster than list!

# Contains Duplicate
def containsDuplicate(nums):
    return len(nums) != len(set(nums))

# Longest Consecutive Sequence — O(n)
def longestConsecutive(nums):
    num_set = set(nums)
    best = 0
    for n in num_set:
        if n - 1 not in num_set:   # start of sequence
            cur, length = n, 1
            while cur + 1 in num_set:
                cur += 1
                length += 1
            best = max(best, length)
    return best

print(longestConsecutive([100,4,200,1,3,2]))  # 4

# Set operations
a = {1, 2, 3, 4}
b = {3, 4, 5, 6}
print(a & b)   # intersection {3,4}
print(a | b)   # union {1,2,3,4,5,6}
print(a - b)   # difference {1,2}
print(a ^ b)   # symmetric diff {1,2,5,6}

# Happy Number — cycle detection using set
def isHappy(n):
    seen = set()
    while n != 1:
        if n in seen: return False
        seen.add(n)
        n = sum(int(d)**2 for d in str(n))
    return True`,
      practice: [
        "LeetCode #128 — Longest Consecutive Sequence (Medium)",
        "LeetCode #202 — Happy Number (Easy)",
        "LeetCode #349 — Intersection of Two Arrays (Easy)"
      ],
      tip: "Use a set whenever you need to check 'have I seen this before?' — it's O(1) vs O(n) for a list."
    }
  },
  {
    day: 25, label: "Thu", cls: "d2", topic: "HashMap Advanced",
    tasks: ["Subarray with sum k", "Prefix sum + HashMap", "Count pairs"],
    detail: {
      goal: "Combine prefix sum with HashMap — powerful pattern for subarray problems",
      code: `from collections import defaultdict

# Subarray Sum Equals K — O(n)
def subarraySum(nums, k):
    count = prefix = 0
    seen = defaultdict(int)
    seen[0] = 1
    for n in nums:
        prefix += n
        count += seen[prefix - k]
        seen[prefix] += 1
    return count

print(subarraySum([1,2,3], 3))  # 2

# Longest Subarray with sum k
def longestSubarraySum(arr, k):
    seen = {}
    prefix = best = 0
    for i, n in enumerate(arr):
        prefix += n
        if prefix == k:
            best = i + 1
        if prefix - k in seen:
            best = max(best, i - seen[prefix - k])
        if prefix not in seen:
            seen[prefix] = i
    return best

# Four Sum Count — 4 arrays, count tuples summing 0
from collections import defaultdict
def fourSumCount(A, B, C, D):
    ab = defaultdict(int)
    for a in A:
        for b in B:
            ab[a+b] += 1
    count = 0
    for c in C:
        for d in D:
            count += ab[-(c+d)]
    return count

# Two Sum variants
# All pairs with difference k
def countPairsWithDiff(arr, k):
    seen = set(arr)
    return sum(1 for n in arr if n + k in seen)`,
      practice: [
        "LeetCode #560 — Subarray Sum Equals K (Medium)",
        "LeetCode #454 — 4Sum II (Medium)",
        "LeetCode #525 — Contiguous Array (Medium)"
      ],
      tip: "Prefix sum + HashMap is one of the most elegant patterns in DSA. Master it — it appears in FAANG interviews constantly."
    }
  },
  {
    day: 26, label: "Fri", cls: "d3", topic: "OrderedDict & LRU",
    tasks: ["OrderedDict usage", "LRU Cache concept", "Move to end trick"],
    detail: {
      goal: "OrderedDict powers LRU Cache — a top Microsoft/Amazon interview question",
      code: `from collections import OrderedDict

# OrderedDict — remembers insertion order
od = OrderedDict()
od["a"] = 1
od["b"] = 2
od["c"] = 3
od.move_to_end("a")        # move to end
od.move_to_end("b", last=False)  # move to front
print(list(od.keys()))     # ['b','c','a']
od.popitem(last=True)      # remove last
od.popitem(last=False)     # remove first

# LRU Cache — Design Problem
class LRUCache:
    def __init__(self, capacity):
        self.cap = capacity
        self.cache = OrderedDict()

    def get(self, key):
        if key not in self.cache:
            return -1
        self.cache.move_to_end(key)  # mark as recently used
        return self.cache[key]

    def put(self, key, value):
        if key in self.cache:
            self.cache.move_to_end(key)
        self.cache[key] = value
        if len(self.cache) > self.cap:
            self.cache.popitem(last=False)  # evict LRU

lru = LRUCache(2)
lru.put(1, 1)
lru.put(2, 2)
print(lru.get(1))   # 1
lru.put(3, 3)       # evicts key 2
print(lru.get(2))   # -1 (not found)`,
      practice: [
        "LeetCode #146 — LRU Cache (Medium)",
        "LeetCode #460 — LFU Cache (Hard — optional)",
        "Implement LRU Cache from scratch without OrderedDict"
      ],
      tip: "LRU Cache is asked in almost every senior-level interview. Understand it deeply — move_to_end is the key trick."
    }
  },
  {
    day: 27, label: "Sat", cls: "d3", topic: "Hashing Problems",
    tasks: ["Word frequency analysis", "Top K frequent", "Isomorphic strings"],
    detail: {
      goal: "Apply all hashing patterns to mixed interview-style problems",
      code: `from collections import Counter
import heapq

# Top K Frequent Elements — O(n log k)
def topKFrequent(nums, k):
    freq = Counter(nums)
    return heapq.nlargest(k, freq.keys(), key=freq.get)

print(topKFrequent([1,1,1,2,2,3], 2))  # [1,2]

# Bucket sort approach — O(n)
def topKFrequent_bucket(nums, k):
    freq = Counter(nums)
    buckets = [[] for _ in range(len(nums)+1)]
    for num, cnt in freq.items():
        buckets[cnt].append(num)
    res = []
    for i in range(len(buckets)-1, 0, -1):
        res.extend(buckets[i])
        if len(res) >= k:
            return res[:k]

# Isomorphic Strings
def isIsomorphic(s, t):
    return len(set(zip(s,t))) == len(set(s)) == len(set(t))

print(isIsomorphic("egg","add"))   # True
print(isIsomorphic("foo","bar"))   # False

# Word Pattern
def wordPattern(pattern, s):
    words = s.split()
    if len(pattern) != len(words): return False
    return len(set(zip(pattern,words))) == len(set(pattern)) == len(set(words))

# Find duplicate in array — Floyd's or set
def findDuplicate(nums):
    seen = set()
    for n in nums:
        if n in seen: return n
        seen.add(n)`,
      practice: [
        "LeetCode #347 — Top K Frequent Elements (Medium)",
        "LeetCode #205 — Isomorphic Strings (Easy)",
        "LeetCode #290 — Word Pattern (Easy)"
      ],
      tip: "zip(s,t) creates pairs — using set(zip(s,t)) is a one-liner for isomorphism checks. Clean Python trick!"
    }
  },
  {
    day: 28, label: "Sun", cls: "d4", topic: "Week 4 Revision",
    tasks: ["Revise all hash patterns", "Timed problem session", "Plan Week 5 (Linked List)"],
    detail: {
      goal: "Lock in all hashing patterns before moving to Linked Lists",
      code: `from collections import defaultdict, Counter

# Pattern recap — solve each in under 10 mins

# 1. Two Sum with HashMap
def twoSum(nums, target):
    seen = {}
    for i, n in enumerate(nums):
        if target - n in seen:
            return [seen[target-n], i]
        seen[n] = i

# 2. Subarray sum = k (prefix + HashMap)
def subarraySum(nums, k):
    seen = defaultdict(int)
    seen[0] = 1
    prefix = count = 0
    for n in nums:
        prefix += n
        count += seen[prefix - k]
        seen[prefix] += 1
    return count

# 3. Top K frequent (Counter + heap)
def topKFrequent(nums, k):
    return [x for x,_ in Counter(nums).most_common(k)]

# 4. Longest consecutive (HashSet)
def longestConsecutive(nums):
    s = set(nums)
    best = 0
    for n in s:
        if n-1 not in s:
            cur = n
            while cur+1 in s: cur += 1
            best = max(best, cur - n + 1)
    return best

# 5. LRU Cache (OrderedDict)
from collections import OrderedDict
class LRUCache:
    def __init__(self, cap):
        self.cap = cap
        self.c = OrderedDict()
    def get(self, k):
        if k not in self.c: return -1
        self.c.move_to_end(k); return self.c[k]
    def put(self, k, v):
        if k in self.c: self.c.move_to_end(k)
        self.c[k] = v
        if len(self.c) > self.cap: self.c.popitem(last=False)`,
      practice: [
        "LeetCode #128 — Longest Consecutive Sequence (Medium)",
        "LeetCode #146 — LRU Cache (Medium)",
        "LeetCode #560 — Subarray Sum Equals K (Medium)"
      ],
      tip: "You've now completed Arrays, Strings, and Hashing — the 3 most tested topics in product company OAs. Week 5 starts Linked Lists!"

];

  currentDay = d.day;
  document.getElementById('detail-title').textContent = `Day ${d.day} — ${d.topic}`;
  document.getElementById('detail-body').innerHTML = `

}

function closeDetail() {
  currentDay = null;
  document.getElementById('detail').classList.remove('active');
