
<style>
  .schedule { padding: 1rem 0; font-family: var(--font-sans); }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .day-card { border-radius: 10px; padding: 10px 8px; border: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary); cursor: pointer; transition: box-shadow .15s; }
  .day-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: var(--color-border-secondary); }
  .day-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .day-num { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
  .topic-badge { font-size: 11px; font-weight: 500; padding: 3px 7px; border-radius: 20px; margin-bottom: 5px; display: inline-block; }
  .tasks { margin-top: 6px; }
  .task { font-size: 11px; color: var(--color-text-secondary); display: flex; align-items: flex-start; gap: 5px; margin-bottom: 3px; line-height: 1.4; }
  .task::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--color-border-secondary); flex-shrink: 0; margin-top: 4px; }
  .detail-panel { margin-top: 16px; border-radius: 12px; border: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary); padding: 16px; display: none; }
  .detail-panel.active { display: block; }
  .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .detail-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
  .detail-close { font-size: 12px; color: var(--color-text-tertiary); cursor: pointer; }
  .code-block { background: var(--color-background-tertiary); border-radius: 8px; padding: 12px; font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); white-space: pre; overflow-x: auto; margin: 8px 0; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin: 10px 0 4px; }
  .tip { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-tertiary); border-left: 3px solid #7F77DD; padding: 8px 10px; border-radius: 0 6px 6px 0; margin-top: 8px; }

  .d1 .day-label { color: #534AB7; } .d1 .topic-badge { background: #EEEDFE; color: #3C3489; }
  .d2 .day-label { color: #534AB7; } .d2 .topic-badge { background: #EEEDFE; color: #3C3489; }
  .d3 .day-label { color: #0F6E56; } .d3 .topic-badge { background: #E1F5EE; color: #085041; }
  .d4 .day-label { color: #0F6E56; } .d4 .topic-badge { background: #E1F5EE; color: #085041; }
  .d5 .day-label { color: #854F0B; } .d5 .topic-badge { background: #FAEEDA; color: #633806; }
  .d6 .day-label { color: #854F0B; } .d6 .topic-badge { background: #FAEEDA; color: #633806; }
  .d7 .day-label { color: #185FA5; } .d7 .topic-badge { background: #E6F1FB; color: #0C447C; }

  @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
</style>

<div class="schedule">
  <div class="header">
    <h2>Week 1 — Python Basics</h2>
    <p>Click any day to see details &amp; code examples</p>
  </div>

  <div class="grid" id="grid"></div>
  <div class="detail-panel" id="detail">
    <div class="detail-header">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-close" onclick="closeDetail()">✕ close</div>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
const days = [
  {
    day: 1, label: "Mon", cls: "d1", topic: "Variables & Types",
    tasks: ["int, float, str, bool", "Type casting", "Arithmetic operators"],
    detail: {
      goal: "Understand how Python stores data",
      code: `x = 10          # int
y = 3.14        # float
name = "Python" # str
flag = True     # bool

# Type casting
print(int("42"))   # 42
print(str(100))    # "100"
print(float(5))    # 5.0`,
      practice: ["Print your name + age", "Convert '99' string to int and add 1", "Check type using type()"],
      tip: "Python doesn't need you to declare types — it figures it out automatically!"
    }
  },
  {
    day: 2, label: "Tue", cls: "d1", topic: "Operators & Input",
    tasks: ["Arithmetic (+,-,*,/,//,%)", "Comparison & logical", "input() function"],
    detail: {
      goal: "Do calculations and take user input",
      code: `# Arithmetic
print(10 // 3)   # 3 (floor div)
print(10 % 3)    # 1 (modulo)
print(2 ** 8)    # 256 (power)

# Comparison
print(5 > 3)     # True
print(5 == 5)    # True

# Input
name = input("Enter name: ")
age  = int(input("Age: "))
print(f"Hi {name}, you are {age}")`,
      practice: ["Build a simple calculator", "Take 2 numbers and print sum/diff/product", "Check if a number is even using %"],
      tip: "Always wrap input() in int() or float() when you need a number, not a string."
    }
  },
  {
    day: 3, label: "Wed", cls: "d2", topic: "Lists & Tuples",
    tasks: ["Create & index lists", "append, pop, sort", "Tuple basics"],
    detail: {
      goal: "Work with ordered collections — your main DSA tool",
      code: `# List
arr = [3, 1, 4, 1, 5]
arr.append(9)      # add end
arr.pop()          # remove end
arr.sort()         # sort in-place
print(arr[0])      # indexing
print(arr[-1])     # last element

# Slicing
print(arr[1:3])    # [1, 3]

# Tuple (immutable)
t = (10, 20, 30)
print(t[0])        # 10`,
      practice: ["Store 5 student marks in a list", "Find max and min without built-ins", "Reverse a list without reverse()"],
      tip: "Lists = mutable (changeable). Tuples = immutable. Use lists 90% of the time in DSA."
    }
  },
  {
    day: 4, label: "Thu", cls: "d2", topic: "Dicts & Sets",
    tasks: ["dict key-value pairs", "set for unique elements", "in operator"],
    detail: {
      goal: "Master hash-based structures — key in almost every DSA problem",
      code: `# Dictionary
d = {"a": 1, "b": 2}
d["c"] = 3         # add
del d["a"]         # remove
print("b" in d)    # True
print(d.keys())
print(d.values())

# defaultdict (bonus)
from collections import defaultdict
freq = defaultdict(int)
for ch in "hello":
    freq[ch] += 1

# Set
s = {1, 2, 3, 3}  # {1,2,3}
s.add(4)
s.discard(2)
print(1 in s)      # O(1) lookup`,
      practice: ["Count frequency of chars in a word", "Find duplicate numbers using set", "Store name→score pairs in a dict"],
      tip: "dict and set have O(1) lookup. This is why they're so powerful in DSA for frequency problems."
    }
  },
  {
    day: 5, label: "Fri", cls: "d3", topic: "Loops",
    tasks: ["for loop + range()", "while loop", "break & continue"],
    detail: {
      goal: "Iterate over data — the backbone of every algorithm",
      code: `# for loop
for i in range(5):       # 0..4
    print(i)

for i in range(1, 10, 2): # 1,3,5,7,9
    print(i)

# iterate list
arr = [10, 20, 30]
for val in arr:
    print(val)

# enumerate
for i, val in enumerate(arr):
    print(i, val)

# while loop
n = 10
while n > 0:
    print(n)
    n -= 2

# break & continue
for i in range(10):
    if i == 5: break      # stop
    if i % 2 == 0: continue  # skip even`,
      practice: ["Print multiplication table of 5", "Sum of digits of a number", "Print all even numbers 1–50"],
      tip: "enumerate() gives you index + value together — very useful in DSA."
    }
  },
  {
    day: 6, label: "Sat", cls: "d3", topic: "Functions",
    tasks: ["def + return", "Default arguments", "Lambda basics"],
    detail: {
      goal: "Write reusable code blocks — essential for DSA solutions",
      code: `# Basic function
def add(a, b):
    return a + b

print(add(3, 4))   # 7

# Default argument
def greet(name, msg="Hello"):
    return f"{msg}, {name}!"

print(greet("Ravi"))
print(greet("Ravi", "Hi"))

# Multiple return
def min_max(arr):
    return min(arr), max(arr)

lo, hi = min_max([3,1,4,1,5])

# Lambda (one-liner)
square = lambda x: x ** 2
print(square(5))   # 25

# Useful with sort
arr = [(1,'b'), (3,'a'), (2,'c')]
arr.sort(key=lambda x: x[0])`,
      practice: ["Write is_prime(n) function", "Write factorial(n) function", "Sort list of strings by length using lambda"],
      tip: "Every LeetCode solution is inside a function. Get comfortable writing and calling them fast."
    }
  },
  {
    day: 7, label: "Sun", cls: "d4", topic: "Revision + Problems",
    tasks: ["Revise all week topics", "Solve 3 LeetCode Easys", "Review mistakes"],
    detail: {
      goal: "Solidify Week 1 — apply everything you learned",
      code: `# LeetCode #1 — Two Sum
def twoSum(nums, target):
    seen = {}
    for i, n in enumerate(nums):
        diff = target - n
        if diff in seen:
            return [seen[diff], i]
        seen[n] = i

# LeetCode #412 — FizzBuzz
def fizzBuzz(n):
    res = []
    for i in range(1, n+1):
        if i % 15 == 0: res.append("FizzBuzz")
        elif i % 3 == 0: res.append("Fizz")
        elif i % 5 == 0: res.append("Buzz")
        else: res.append(str(i))
    return res

# LeetCode #344 — Reverse String
def reverseString(s):
    l, r = 0, len(s)-1
    while l < r:
        s[l], s[r] = s[r], s[l]
        l += 1; r -= 1`,
      practice: ["Two Sum (#1)", "FizzBuzz (#412)", "Reverse String (#344)"],
      tip: "Don't memorize solutions — understand WHY each approach works. That's what interviews test."
    }
  }
];

const grid = document.getElementById('grid');
days.forEach(d => {
  const card = document.createElement('div');
  card.className = `day-card ${d.cls}`;
  card.innerHTML = `
    <div class="day-label">${d.label}</div>
    <div class="day-num">Day ${d.day}</div>
    <span class="topic-badge">${d.topic}</span>
    <div class="tasks">${d.tasks.map(t => `<div class="task">${t}</div>`).join('')}</div>
  `;
  card.onclick = () => showDetail(d);
  grid.appendChild(card);
});

let currentDay = null;
function showDetail(d) {
  if (currentDay === d.day) { closeDetail(); return; }
  currentDay = d.day;
  document.getElementById('detail-title').textContent = `Day ${d.day} — ${d.topic}`;
  document.getElementById('detail-body').innerHTML = `
    <div class="section-label">Goal</div>
    <div style="font-size:13px;color:var(--color-text-primary);margin-bottom:8px">${d.detail.goal}</div>
    <div class="section-label">Code to write today</div>
    <div class="code-block">${d.detail.code}</div>
    <div class="section-label">Practice exercises</div>
    ${d.detail.practice.map(p => `<div class="task" style="font-size:12px;color:var(--color-text-primary);margin-bottom:4px">${p}</div>`).join('')}
    <div class="tip">💡 ${d.detail.tip}</div>
  `;
  document.getElementById('detail').classList.add('active');
}

function closeDetail() {
  currentDay = null;
  document.getElementById('detail').classList.remove('active');
}
</script>
