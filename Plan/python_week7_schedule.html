sys.setrecursionlimit(10000)

# Basic recursion — always 3 parts:
# 1) Base case  2) Recursive call  3) Build answer

# Fibonacci — naive O(2^n)
def fib_naive(n):
    if n <= 1: return n
    return fib_naive(n-1) + fib_naive(n-2)

# Fibonacci — memoized O(n)
def fib_memo(n, memo={}):
    if n in memo: return memo[n]
    if n <= 1: return n
    memo[n] = fib_memo(n-1, memo) + fib_memo(n-2, memo)
    return memo[n]

# Using lru_cache (cleanest way)
from functools import lru_cache

@lru_cache(maxsize=None)
def fib(n):
    if n <= 1: return n
    return fib(n-1) + fib(n-2)

print(fib(50))  # instant!

# Power function — O(log n)
def power(base, exp):
    if exp == 0: return 1
    if exp % 2 == 0:
        half = power(base, exp // 2)
        return half * half
    return base * power(base, exp - 1)

# Sum of digits recursively
def sumDigits(n):
    if n < 10: return n
    return n % 10 + sumDigits(n // 10)

# Count ways to climb stairs (1 or 2 steps)
@lru_cache(maxsize=None)
def climbStairs(n):
    if n <= 2: return n
    return climbStairs(n-1) + climbStairs(n-2)

print(climbStairs(10))  # 89`,

            current.append(candidates[i])

    backtrack(0, [], target)

def permute_swap(nums):
    result = []
    def backtrack(start):
        if start == len(nums):
            result.append(nums[:])
            return
        for i in range(start, len(nums)):
            nums[start], nums[i] = nums[i], nums[start]
            backtrack(start + 1)

def permuteUnique(nums):

            if i > 0 and nums[i] == nums[i-1] and not used[i-1]:
                continue          # skip duplicate
            used[i] = True
            current.append(nums[i])
            backtrack(current)
            current.pop()
            used[i] = False
    backtrack([])
    return result

# Next permutation — O(n)
def nextPermutation(nums):
    n = len(nums)
    i = n - 2
    while i >= 0 and nums[i] >= nums[i+1]: i -= 1
    if i >= 0:
        j = n - 1
        while nums[j] <= nums[i]: j -= 1
        nums[i], nums[j] = nums[j], nums[i]
    nums[i+1:] = reversed(nums[i+1:])`,

def exist(board, word):
    rows, cols = len(board), len(board[0])

    def dfs(r, c, idx):
        if idx == len(word): return True
        if r < 0 or r >= rows or c < 0 or c >= cols:
            return False
        if board[r][c] != word[idx]: return False

        temp = board[r][c]
        board[r][c] = '#'         # mark visited

        found = (dfs(r+1,c,idx+1) or dfs(r-1,c,idx+1) or
                 dfs(r,c+1,idx+1) or dfs(r,c-1,idx+1))

        board[r][c] = temp        # restore (backtrack)
        return found

    for r in range(rows):
        for c in range(cols):
            if dfs(r, c, 0): return True
    return False

# Rat in a maze — find all paths
def ratMaze(maze):
    n = len(maze)
    result = []
    path = ""
    visited = [[False]*n for _ in range(n)]

    def dfs(r, c):
        if r == n-1 and c == n-1:
            result.append(path)
            return
        dirs = [('D',1,0),('L',0,-1),('R',0,1),('U',-1,0)]
        for d, dr, dc in dirs:
            nr, nc = r+dr, c+dc
            if (0<=nr<n and 0<=nc<n and
                maze[nr][nc]==1 and not visited[nr][nc]):
                visited[nr][nc] = True
                dfs.__wrapped__ = path
                nonlocal path
                path += d
                dfs(nr, nc)
                path = path[:-1]
                visited[nr][nc] = False

    if maze[0][0] == 1:
        visited[0][0] = True
        dfs(0, 0)
    return result

# Flood fill (simpler grid DFS)
def floodFill(image, sr, sc, color):
    orig = image[sr][sc]
    if orig == color: return image
    def dfs(r, c):
        if r<0 or r>=len(image) or c<0 or c>=len(image[0]): return
        if image[r][c] != orig: return
        image[r][c] = color
        dfs(r+1,c); dfs(r-1,c); dfs(r,c+1); dfs(r,c-1)
    dfs(sr, sc)
    return image`,

def solveNQueens(n):
    result = []
    cols = set()
    pos_diag = set()   # r + c
    neg_diag = set()   # r - c

    board = [['.'] * n for _ in range(n)]

    def backtrack(row):
        if row == n:
            result.append([''.join(r) for r in board])
            return
        for col in range(n):
            if col in cols or (row+col) in pos_diag or (row-col) in neg_diag:
                continue
            cols.add(col)
            pos_diag.add(row+col)
            neg_diag.add(row-col)
            board[row][col] = 'Q'

            backtrack(row + 1)

            cols.remove(col)
            pos_diag.remove(row+col)
            neg_diag.remove(row-col)
            board[row][col] = '.'

    backtrack(0)
    return result

print(len(solveNQueens(8)))  # 92 solutions

# Sudoku Solver
def solveSudoku(board):
    def is_valid(r, c, val):
        if val in board[r]: return False
        if val in [board[i][c] for i in range(9)]: return False
        br, bc = 3*(r//3), 3*(c//3)
        for i in range(br, br+3):
            for j in range(bc, bc+3):
                if board[i][j] == val: return False
        return True

    def solve():
        for r in range(9):
            for c in range(9):
                if board[r][c] == '.':
                    for val in '123456789':
                        if is_valid(r, c, val):
                            board[r][c] = val
                            if solve(): return True
                            board[r][c] = '.'
                    return False
        return True
    solve()

# Palindrome Partitioning
def partition(s):
    result = []
    def is_pal(sub): return sub == sub[::-1]
    def backtrack(start, current):
        if start == len(s):
            result.append(current[:])
            return
        for end in range(start+1, len(s)+1):
            if is_pal(s[start:end]):
                current.append(s[start:end])
                backtrack(end, current)
                current.pop()
    backtrack(0, [])
    return result`,

def generateParenthesis(n):
    result = []
    def backtrack(current, open_count, close_count):
        if len(current) == 2 * n:
            result.append(current)
            return
        # Pruning: only add if valid
        if open_count < n:
            backtrack(current + '(', open_count+1, close_count)
        if close_count < open_count:
            backtrack(current + ')', open_count, close_count+1)
    backtrack('', 0, 0)
    return result

print(generateParenthesis(3))

# Letter Combinations of Phone Number
def letterCombinations(digits):
    if not digits: return []
    phone = {'2':'abc','3':'def','4':'ghi','5':'jkl',
             '6':'mno','7':'pqrs','8':'tuv','9':'wxyz'}
    result = []
    def backtrack(idx, current):
        if idx == len(digits):
            result.append(current)
            return
        for ch in phone[digits[idx]]:
            backtrack(idx+1, current+ch)
    backtrack(0, '')
    return result

def combinationSum2(candidates, target):

            current.append(candidates[i])
            backtrack(i+1, current, remaining-candidates[i])
            current.pop()
    backtrack(0, [], target)

# Beautiful Arrangement — pruning example
def countArrangement(n):
    count = [0]
    used = [False] * (n+1)
    def backtrack(pos):
        if pos > n: count[0] += 1; return
        for i in range(1, n+1):
            if not used[i] and (i%pos==0 or pos%i==0):
                used[i] = True
                backtrack(pos+1)
                used[i] = False
    backtrack(1)
    return count[0]`,

            cur.append(cands[i]); bt(i, cur, rem-cands[i]); cur.pop()

def numIslands(grid):

    for r in range(len(grid)):
        for c in range(len(grid[0])):
            if grid[r][c]=='1': dfs(r,c); count+=1
