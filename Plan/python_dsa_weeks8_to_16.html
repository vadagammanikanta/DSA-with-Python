class TreeNode:
    def __init__(self, val=0, left=None, right=None):

# Build tree from list
def buildTree(vals):
    if not vals: return None
    root = TreeNode(vals[0])
    q = deque([root])
    i = 1
    while q and i < len(vals):
        node = q.popleft()

        i += 1

# Preorder: Root → Left → Right
def preorder(root):

    return [root.val] + preorder(root.left) + preorder(root.right)

# Postorder: Left → Right → Root

    return postorder(root.left) + postorder(root.right) + [root.val]

def searchBST(root, val):
    if not root or root.val == val: return root

# Insert into BST
def insertIntoBST(root, val):
    if not root: return TreeNode(val)
    if val < root.val: root.left = insertIntoBST(root.left, val)
    else: root.right = insertIntoBST(root.right, val)

# Delete from BST
def deleteNode(root, key):
    if not root: return None
    if key < root.val: root.left = deleteNode(root.left, key)
    elif key > root.val: root.right = deleteNode(root.right, key)
    else:
        if not root.left: return root.right
        if not root.right: return root.left
        # find inorder successor (min of right subtree)
        cur = root.right
        while cur.left: cur = cur.left
        root.val = cur.val
        root.right = deleteNode(root.right, cur.val)
    return root

def canFinish(numCourses, prerequisites):
    graph = defaultdict(list)

    state = [0] * numCourses

        for nei in graph[node]:

class UnionFind:
    def __init__(self, n):
        self.parent = list(range(n))
        self.rank = [0] * n
        self.components = n

    def find(self, x):
        if self.parent[x] != x:
            self.parent[x] = self.find(self.parent[x])  # path compression
        return self.parent[x]

    def union(self, x, y):
        px, py = self.find(x), self.find(y)
        if px == py: return False  # already connected
        # union by rank
        if self.rank[px] < self.rank[py]: px,py=py,px
        self.parent[py] = px
        if self.rank[px]==self.rank[py]: self.rank[px]+=1
        self.components -= 1
        return True

    def connected(self, x, y):
        return self.find(x) == self.find(y)

# BFS — shortest path in unweighted graph
def shortestPath(graph, start, end):
    queue = deque([(start, [start])])
    visited = {start}
    while queue:
        node, path = queue.popleft()
        if node == end: return path

# Dijkstra — shortest path in weighted graph O((V+E) log V)
def dijkstra(graph, start):
    dist = {node: float('inf') for node in graph}
    dist[start] = 0
    heap = [(0, start)]
    while heap:
        d, node = heapq.heappop(heap)
        if d > dist[node]: continue
        for nei, weight in graph[node]:
            new_dist = dist[node] + weight
            if new_dist < dist[nei]:
                dist[nei] = new_dist
                heapq.heappush(heap, (new_dist, nei))
    return dist

def networkDelayTime(times, n, k):

    dist[k] = 0
    heap = [(0,k)]

let activeWeek = WEEKS[0];
let activeDay = null;

function renderTabs(){
  const tabs=document.getElementById('tabs'); tabs.innerHTML='';
  WEEKS.forEach(w=>{
    const t=document.createElement('div');
    t.className='week-tab'+(w.num===activeWeek.num?' active':'');
    t.textContent=w.label+' '+w.title.split(' ')[0];
    t.style.background=w.num===activeWeek.num?w.color:'';
    t.onclick=()=>{ activeWeek=w; activeDay=null; closeDetail(); renderAll(); };
    tabs.appendChild(t);
  });
}

function renderWeekHeader(){
  document.getElementById('week-header').innerHTML=`
    <div class="week-title" style="color:${activeWeek.color}">Week ${activeWeek.num} — ${activeWeek.title}</div>
    <div class="week-sub">${activeWeek.sub}</div>
  `;
  document.getElementById('week-header').style.background=activeWeek.bg;
}

function renderDays(){
  const grid=document.getElementById('daygrid'); grid.innerHTML='';
  activeWeek.days.forEach(d=>{
    const card=document.createElement('div');
    card.className='day-card'+(activeDay&&activeDay.day===d.day?' selected':'');
    card.style.borderColor=activeDay&&activeDay.day===d.day?activeWeek.color:'';
    card.innerHTML=`
      <div class="dlabel" style="color:${activeWeek.color}">${d.label}</div>
      <div class="dnum">Day ${d.day}</div>
      <span class="dtopic" style="background:${activeWeek.bg};color:${activeWeek.textDark}">${d.topic}</span>
      <div>${d.tasks.map(t=>`<div class="dtask">${t}</div>`).join('')}</div>
    `;
    card.onclick=()=>showDetail(d);
    grid.appendChild(card);
  });
}

function showDetail(d){
  if(activeDay&&activeDay.day===d.day){ closeDetail(); return; }
  activeDay=d;
  document.getElementById('det-title').textContent=`Day ${d.day} — ${d.topic}`;
  document.getElementById('det-body').innerHTML=`
    <div class="slabel">Goal</div>
    <div style="font-size:12px;color:var(--color-text-primary);margin-bottom:6px;line-height:1.5">${d.goal}</div>
    <div class="slabel">Code to write today</div>
    <div class="code">${d.code}</div>
    <div class="slabel">LeetCode practice</div>
    ${d.practice.map(p=>`<div class="lc-item">${p}</div>`).join('')}
    <div class="tip">💡 ${d.tip}</div>
  `;
  document.getElementById('detail').classList.add('show');
  renderDays();
}

function closeDetail(){
  activeDay=null;
  document.getElementById('detail').classList.remove('show');
  renderDays();
}

function renderAll(){ renderTabs(); renderWeekHeader(); renderDays(); }
