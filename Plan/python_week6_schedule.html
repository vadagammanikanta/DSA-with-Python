stack = []

# Stack class
class Stack:
    def __init__(self):

    def push(self, val): self.s.append(val)
    def pop(self): return self.s.pop() if self.s else None
    def peek(self): return self.s[-1] if self.s else None

# Valid Parentheses — classic stack problem
def isValid(s):
    stack = []
    mapping = {')': '(', ']': '[', '}': '{'}
    for ch in s:
        if ch in mapping:
            top = stack.pop() if stack else '#'
            if mapping[ch] != top:

        else:

    return not stack

print(isValid("()[]{}"))   # True
print(isValid("(]"))       # False

def evalRPN(tokens):
    stack = []
    ops = {
        '+': lambda a,b: a+b,
        '-': lambda a,b: a-b,
        '*': lambda a,b: a*b,
        '/': lambda a,b: int(a/b)
    }
    for t in tokens:
        if t in ops:
            b, a = stack.pop(), stack.pop()
            stack.append(ops[t](a, b))
        else:
            stack.append(int(t))
    return stack[0]

print(evalRPN(["2","1","+","3","*"]))  # 9

# Decode String: "3[a2[bc]]" → "abcbcabcbc"
def decodeString(s):
    stack = []
    cur_str = ""
    cur_num = 0
    for ch in s:
        if ch.isdigit():
            cur_num = cur_num * 10 + int(ch)
        elif ch == '[':
            stack.append((cur_str, cur_num))
            cur_str, cur_num = "", 0
        elif ch == ']':
            prev_str, num = stack.pop()
            cur_str = prev_str + num * cur_str
        else:
            cur_str += ch
    return cur_str

print(decodeString("3[a]2[bc]"))    # "aaabcbc"
print(decodeString("3[a2[bc]]"))    # "abcbcabcbc"

# Daily Temperatures — next greater element
def dailyTemperatures(temps):
    res = [0] * len(temps)
    stack = []  # stores indices
    for i, t in enumerate(temps):
        while stack and temps[stack[-1]] < t:
            idx = stack.pop()
            res[idx] = i - idx
        stack.append(i)
    return res

def nextGreaterElement(nums1, nums2):
    nge = {}
    stack = []
    for n in nums2:
        while stack and stack[-1] < n:
            nge[stack.pop()] = n
        stack.append(n)
    return [nge.get(n, -1) for n in nums1]

# Next Greater Element II (circular)
def nextGreaterElements(nums):
    n = len(nums)
    res = [-1] * n
    stack = []
    for i in range(2 * n):
        while stack and nums[stack[-1]] < nums[i % n]:
            res[stack.pop()] = nums[i % n]
        if i < n:
            stack.append(i)
    return res

print(nextGreaterElements([1,2,1]))  # [2,-1,2]

# Largest Rectangle in Histogram — O(n)
def largestRectangleArea(heights):
    stack = []   # monotonic increasing
    max_area = 0
    heights.append(0)  # sentinel
    for i, h in enumerate(heights):
        while stack and heights[stack[-1]] > h:
            height = heights[stack.pop()]
            width = i if not stack else i - stack[-1] - 1
            max_area = max(max_area, height * width)
        stack.append(i)
    return max_area

print(largestRectangleArea([2,1,5,6,2,3]))  # 10

# Trapping Rain Water — O(n) monotonic stack
def trap(height):
    stack = []
    water = 0
    for i, h in enumerate(height):
        while stack and height[stack[-1]] < h:
            bot = stack.pop()
            if not stack: break
            left = stack[-1]
            width = i - left - 1
            bounded = min(height[left], h) - height[bot]
            water += width * bounded
        stack.append(i)
    return water`,

# Queue using deque — FIFO
q = deque()
q.append(10)      # enqueue right
q.append(20)
q.append(30)
print(q[0])       # peek front → 10
q.popleft()       # dequeue → 10

# Queue class
class Queue:
    def __init__(self):

    def is_empty(self): return len(self.q) == 0

# Design Circular Queue
class MyCircularQueue:

    def enQueue(self, val):

        self.q.append(val); return True
    def deQueue(self):
        if not self.q: return False
        self.q.pop(0); return True
    def Front(self): return self.q[0] if self.q else -1
    def Rear(self): return self.q[-1] if self.q else -1
    def isEmpty(self): return len(self.q) == 0
    def isFull(self): return len(self.q) == self.size

# BFS using Queue — level order traversal
from collections import deque
class TreeNode:
    def __init__(self, val=0):
        self.val = val; self.left = self.right = None

def levelOrder(root):
    if not root: return []
    result, q = [], deque([root])
    while q:
        level = []
        for _ in range(len(q)):
            node = q.popleft()
            level.append(node.val)
            if node.left: q.append(node.left)
            if node.right: q.append(node.right)
        result.append(level)
    return result`,

# Sliding Window Maximum — O(n) using monotonic deque
def maxSlidingWindow(nums, k):
    dq = deque()   # stores indices, decreasing values
    result = []
    for i, n in enumerate(nums):
        # remove elements outside window
        while dq and dq[0] < i - k + 1:
            dq.popleft()
        # remove smaller elements from back
        while dq and nums[dq[-1]] < n:
            dq.pop()
        dq.append(i)
        if i >= k - 1:
            result.append(nums[dq[0]])
    return result

print(maxSlidingWindow([1,3,-1,-3,5,3,6,7], 3))

# First negative in every window of size k
def firstNegative(arr, k):
    dq = deque()
    result = []
    for i in range(len(arr)):
        if arr[i] < 0:
            dq.append(i)
        if dq and dq[0] < i - k + 1:
            dq.popleft()
        if i >= k - 1:
            result.append(arr[dq[0]] if dq else 0)
    return result

# Sliding window using deque — min of window
def minSlidingWindow(nums, k):
    dq = deque()   # stores indices, increasing values
    result = []
    for i, n in enumerate(nums):

        while dq and nums[dq[-1]] > n:

        dq.append(i)
        if i >= k - 1:

    return result

# Jump Game using deque BFS
def canJump(nums):

        max_reach = max(max_reach, i + n)
    return True`,

# Implement Stack using Queues
class MyStack:
    def __init__(self):
        self.q = deque()
    def push(self, x):
        self.q.append(x)
        for _ in range(len(self.q) - 1):
            self.q.append(self.q.popleft())
    def pop(self): return self.q.popleft()
    def top(self): return self.q[0]
    def empty(self): return not self.q

# Implement Queue using Stacks
class MyQueue:
    def __init__(self):
        self.in_stack = []
        self.out_stack = []
    def push(self, x): self.in_stack.append(x)
    def pop(self):
        self._transfer()
        return self.out_stack.pop()
    def peek(self):
        self._transfer()
        return self.out_stack[-1]
    def _transfer(self):
        if not self.out_stack:
            while self.in_stack:
                self.out_stack.append(self.in_stack.pop())
    def empty(self): return not self.in_stack and not self.out_stack

# Design Browser History
class BrowserHistory:
    def __init__(self, homepage):
        self.history = [homepage]
        self.cur = 0
    def visit(self, url):
        self.history = self.history[:self.cur+1]
        self.history.append(url)
        self.cur += 1
    def back(self, steps):
        self.cur = max(0, self.cur - steps)
        return self.history[self.cur]
    def forward(self, steps):
        self.cur = min(len(self.history)-1, self.cur + steps)
        return self.history[self.cur]

bh.visit("facebook.com")

# Pattern 1: Stack — valid parentheses
def isValid(s):
    stack = []
    mapping = {')':'(', ']':'[', '}':'{'}
    for ch in s:
        if ch in mapping:
            if not stack or stack[-1] != mapping[ch]: return False

# Pattern 2: Monotonic Stack — next greater
def nextGreaterElements(nums):
    n = len(nums)
    res = [-1] * n

# Pattern 3: Min Stack
class MinStack:
    def __init__(self): self.s = []; self.m = []

# Pattern 4: Monotonic Deque — sliding window max
def maxSlidingWindow(nums, k):

# Pattern 5: Queue using 2 Stacks

    def peek(self):
