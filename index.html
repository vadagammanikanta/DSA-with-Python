<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python & DSA Mastery — 16-Week Roadmap</title>
<meta name="description" content="Complete 16-week Python & DSA curriculum — from basics to interview-ready. Track your progress daily.">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSA Roadmap">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS — PREMIUM HYBRID DESIGN SYSTEM
   ══════════════════════════════════════════ */
:root {
  /* Colors - Light Theme (Ultra Premium Slate-Blue) */
  --bg:           #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary:  #f1f5f9;
  --bg-glass:     rgba(248, 250, 252, 0.8);
  --fg:           #0f172a;
  --fg-secondary: #475569;
  --fg-muted:     #94a3b8;
  --border:       #e2e8f0;
  --border-hover: #cbd5e1;
  --accent:       #3b82f6;
  --accent-glow:  rgba(59, 130, 246, 0.15);
  --accent-bg:    #eff6ff;
  --success:      #10b981;
  --success-glow: rgba(16, 185, 129, 0.2);
  --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  --radius-sm:    8px;
  --radius:       12px;
  --radius-lg:    20px;
  --shadow-sm:    0 1px 2px rgba(15, 23, 42, 0.05);
  --shadow:       0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
  --shadow-md:    0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -4px rgba(15, 23, 42, 0.08);
  --shadow-lg:    0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.1);
  --transition:   250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  /* Colors - Dark Theme (Premium Deep Space/Cyberpunk Slate) */
  --bg:           #08080c;
  --bg-secondary: #111118;
  --bg-tertiary:  #1b1b26;
  --bg-glass:     rgba(8, 8, 12, 0.7);
  --fg:           #f8fafc;
  --fg-secondary: #cbd5e1;
  --fg-muted:     #64748b;
  --border:       #1e1e2d;
  --border-hover: #33334c;
  --accent:       #60a5fa;
  --accent-glow:  rgba(96, 165, 250, 0.25);
  --accent-bg:    #172554;
  --success:      #34d399;
  --success-glow: rgba(52, 211, 153, 0.3);
  --shadow-sm:    0 1px 2px rgba(0, 0, 0, 0.5);
  --shadow:       0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -2px rgba(0, 0, 0, 0.5);
  --shadow-md:    0 10px 15px -3px rgba(0, 0, 0, 0.6), 0 4px 6px -4px rgba(0, 0, 0, 0.6);
  --shadow-lg:    0 25px 50px -12px rgba(0, 0, 0, 0.7);
}

/* Custom Scrollbars */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: var(--bg);
}
::-webkit-scrollbar-thumb {
  background: var(--border-hover);
  border: 3px solid var(--bg);
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--fg-muted);
}

/* ══════════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--transition), color var(--transition);
}

/* ══════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════ */
.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ══════════════════════════════════════════
   TOPBAR (Sticky Frosted Glass)
   ══════════════════════════════════════════ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-glass);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
}

.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--fg);
  background: linear-gradient(135deg, var(--fg) 50%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}
.topbar-sub {
  font-size: 12px;
  color: var(--fg-secondary);
  font-weight: 500;
  letter-spacing: -0.01em;
}

.topbar-right { display: flex; align-items: center; gap: 16px; }

/* ══════════════════════════════════════════
   PROGRESS PILL
   ══════════════════════════════════════════ */
.progress-pill {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 6px 16px;
  box-shadow: var(--shadow-sm);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.progress-pill:hover {
  border-color: var(--border-hover);
  box-shadow: var(--shadow);
}
.progress-text {
  font-size: 12px;
  font-weight: 700;
  color: var(--fg);
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.progress-bar {
  width: 120px;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
  background-size: 200% auto;
  animation: shimmer 4s linear infinite;
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 0%;
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Status dot (pulsing indicator) */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 0 0 0 var(--success-glow);
  animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
.status-dot.complete { background: var(--fg-muted); animation: none; box-shadow: none; }

@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
  70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
  100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}

/* ══════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-secondary);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-fast);
  white-space: nowrap;
}
.btn:hover {
  background: var(--bg-tertiary);
  border-color: var(--border-hover);
  color: var(--fg);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.btn:active { transform: translateY(0); }
.btn svg { flex-shrink: 0; transition: transform var(--transition-fast); }
.btn:hover svg { transform: rotate(15deg); }

/* ══════════════════════════════════════════
   MAIN CONTENT
   ══════════════════════════════════════════ */
.main { padding: 32px 32px 80px; max-width: 1320px; margin: 0 auto; }

/* ══════════════════════════════════════════
   WEEK NAVIGATION TABS
   ══════════════════════════════════════════ */
.week-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.week-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--fg-secondary);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-fast);
}
.week-tab:hover {
  border-color: var(--border-hover);
  color: var(--fg);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.week-tab:active { transform: translateY(0); }
.week-tab.active {
  color: #ffffff !important;
  font-weight: 700;
  border-color: transparent;
  box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.25), inset 0 -3px 0 rgba(0, 0, 0, 0.15);
  transform: scale(1.03);
}
.week-tab-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.8;
  transition: transform var(--transition-fast);
}
.week-tab:hover .week-tab-dot { transform: scale(1.2); }

/* ══════════════════════════════════════════
   WEEK HEADER BANNER
   ══════════════════════════════════════════ */
.week-banner {
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
  transition: transform var(--transition), box-shadow var(--transition);
}
.week-banner:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.week-banner::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
}
[data-theme="dark"] .week-banner::after {
  background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
}

.week-banner-left { display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 2; }
.week-banner-title { font-size: 22px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.2; }
.week-banner-sub { font-size: 13.5px; line-height: 1.5; font-weight: 500; max-width: 800px; }
.week-banner-stats {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 13px;
  font-weight: 600;
  position: relative;
  z-index: 2;
}
.week-banner-stats span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(4px);
}
[data-theme="dark"] .week-banner-stats span {
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

/* ══════════════════════════════════════════
   DAY GRID & CARD
   ══════════════════════════════════════════ */
.day-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.day-card {
  position: relative;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  min-height: 160px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.day-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 4px;
  background: var(--card-color, var(--border));
  opacity: 0.3;
  transition: opacity var(--transition), width var(--transition);
}
.day-card:hover {
  border-color: var(--card-color, var(--border-hover));
  box-shadow: 0 10px 20px -10px var(--card-color, rgba(0,0,0,0.15));
  transform: translateY(-4px);
}
.day-card:hover::before { opacity: 1; width: 6px; }
.day-card.active {
  border-color: var(--card-color, var(--accent));
  box-shadow: 0 12px 24px -10px var(--card-color, var(--accent-glow));
  background: var(--bg-secondary);
}
.day-card.active::before { opacity: 1; width: 6px; }
.day-card.completed {
  opacity: 0.75;
  background: var(--bg-tertiary);
  border-color: var(--border);
}
.day-card.completed::before { opacity: 0.15; }
.day-card.completed:hover { opacity: 0.95; box-shadow: var(--shadow); }
.day-card.completed .day-num { text-decoration: line-through; opacity: 0.5; }

/* Card inner header */
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.day-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--card-color, var(--fg-secondary));
}

/* Custom styled Checkbox */
.day-checkbox {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border-hover);
  border-radius: 5px;
  background: var(--bg-secondary);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  outline: none;
  transition: all var(--transition-fast);
}
.day-checkbox:hover {
  border-color: var(--card-color, var(--accent));
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.day-checkbox:checked {
  background: var(--card-color, var(--accent));
  border-color: var(--card-color, var(--accent));
}
.day-checkbox:checked::after {
  content: '';
  position: absolute;
  left: 5px; top: 2px;
  width: 4px; height: 8px;
  border: solid #ffffff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.day-num {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  color: var(--fg);
  margin-bottom: 8px;
}
.topic-chip {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--card-bg, var(--bg-tertiary));
  color: var(--card-textDark, var(--fg-secondary));
  margin-bottom: 12px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.task-list { margin-top: auto; display: flex; flex-direction: column; gap: 4px; }
.task-item {
  font-size: 11px;
  color: var(--fg-secondary);
  display: flex;
  align-items: flex-start;
  gap: 6px;
  line-height: 1.4;
}
.task-item::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--card-color, var(--fg-muted));
  flex-shrink: 0;
  margin-top: 6px;
  opacity: 0.7;
}
.day-card.completed .task-item { color: var(--fg-muted); }

/* ══════════════════════════════════════════
   DETAIL PANEL WORKSPACE
   ══════════════════════════════════════════ */
.detail-panel {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-secondary);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  display: none;
  animation: slideIn var(--transition);
  margin-bottom: 24px;
}
.detail-panel.visible { display: block; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.detail-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-wrap: wrap;
  gap: 16px;
}
.detail-title-row { display: flex; flex-direction: column; gap: 4px; }
.detail-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--fg);
}
.detail-goal {
  font-size: 13px;
  color: var(--fg-secondary);
  max-width: 800px;
  line-height: 1.5;
}
.detail-actions { display: flex; align-items: center; gap: 16px; }
.detail-complete-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-secondary);
  cursor: pointer;
  user-select: none;
}

.detail-body { display: grid; grid-template-columns: 1.2fr 1fr; background: var(--bg-secondary); }
.detail-left  { padding: 24px; border-right: 1px solid var(--border); background: var(--bg); position: relative; }
.detail-right { padding: 24px; display: flex; flex-direction: column; gap: 20px; background: var(--bg-secondary); }

.detail-section-label {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--fg-muted);
  margin-bottom: 12px;
  display: block;
}

/* Decorative blueprint label */
.detail-left::before {
  content: 'blueprint.py';
  position: absolute;
  top: 48px;
  right: 44px;
  background: #1e1e2f;
  color: #8f9aa8;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 6px;
  border: 1px solid #2d2d44;
  pointer-events: none;
  z-index: 10;
}

/* Code Block IDE Styling */
.code-block {
  background: #0d0e15 !important;
  border: 1px solid #1e1e2d;
  border-radius: var(--radius);
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: #c9d1d9;
  white-space: pre;
  overflow-x: auto;
  line-height: 1.65;
  tab-size: 4;
  box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
  position: relative;
}

.code-block::-webkit-scrollbar { width: 8px; height: 8px; }
.code-block::-webkit-scrollbar-track { background: #0d0e15; }
.code-block::-webkit-scrollbar-thumb {
  background: #2a2c3f;
  border-radius: 4px;
  border: 2px solid #0d0e15;
}
.code-block::-webkit-scrollbar-thumb:hover { background: #474a68; }

/* ══════════════════════════════════════════
   PRACTICE LIST & BADGES
   ══════════════════════════════════════════ */
.practice-list { display: flex; flex-direction: column; gap: 8px; }
.practice-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
  color: var(--fg);
  line-height: 1.5;
  background: var(--bg-tertiary);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all var(--transition-fast);
}
.practice-item:hover {
  border-color: var(--border-hover);
  transform: translateX(4px);
  background: var(--bg);
}
.practice-item::before {
  content: '⚡';
  color: var(--card-color, var(--accent));
  flex-shrink: 0;
  font-size: 12px;
}

/* Difficulty Badges */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 12px;
  line-height: 1;
}
.badge.easy {
  background: rgba(16, 185, 129, 0.15);
  color: #10b981;
  border: 1px solid rgba(16, 185, 129, 0.2);
}
.badge.medium {
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
  border: 1px solid rgba(245, 158, 11, 0.2);
}
.badge.hard {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.2);
}

/* ══════════════════════════════════════════
   PRO TIP BOX
   ══════════════════════════════════════════ */


/* ══════════════════════════════════════════
   CLOSE BTN
══════════════════════════════════════════ */
.close-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  cursor: pointer;
  color: var(--fg-secondary);
  transition: all var(--transition-fast);
  font-size: 14px;
  box-shadow: var(--shadow-sm);
}
.close-btn:hover {
  background: var(--bg-tertiary);
  color: var(--fg);
  transform: rotate(90deg);
  border-color: var(--border-hover);
}

.tip-box {
  display: flex;
  gap: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-left: 4px solid var(--card-color, var(--accent));
  border-radius: 4px var(--radius) var(--radius) 4px;
  padding: 16px 20px;
  font-size: 13px;
  color: var(--fg-secondary);

def solveNQueens(n):

    pos_diag = set()   # r + c

    board = [['.'] * n for _ in range(n)]

class UnionFind:
    def __init__(self, n):
        self.parent = list(range(n))
        self.rank = [0] * n
        self.components = n

    def find(self, x):
        if self.parent[x] != x:
            self.parent[x] = self.find(self.parent[x])  # path compression
        return self.parent[x]

    def union(self, x, y):
        px, py = self.find(x), self.find(y)
        if px == py: return False  # already connected
        if self.rank[px] < self.rank[py]: px,py=py,px
        self.parent[py] = px
        if self.rank[px]==self.rank[py]: self.rank[px]+=1
        self.components -= 1
        return True`,

def coinChange(coins,amount):

def dailyTemperatures(temps):

# Backtracking — Medium
def generateParenthesis(n):

        if o<n: bt(s+'(',o+1,c)

    bt('',0,0); return res

def findOrder(numCourses,prerequisites):

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let activeWeekNum = 1;
let activeDay = null;

function getWeek(num) { return CURRICULUM.find(w => w.num === num); }
function getActiveWeek() { return getWeek(activeWeekNum); }

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
function getCompleted() {
  try { return JSON.parse(localStorage.getItem('dsaRoadmap_v2')) || {}; }
  catch(e) { return {}; }
}
function saveCompleted(data) { localStorage.setItem('dsaRoadmap_v2', JSON.stringify(data)); }

// ══════════════════════════════════════════
// THEME
// ══════════════════════════════════════════
function initTheme() {
  const saved = localStorage.getItem('dsaTheme_v2');
  const theme = saved || 'light';
  applyTheme(theme);
}

function applyTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem('dsaTheme_v2', theme);
  const label = document.getElementById('theme-label');
  const icon  = document.getElementById('theme-icon');
  if (theme === 'dark') {
    label.textContent = 'Light mode';
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    label.textContent = 'Dark mode';
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}

function toggleTheme() {
  const cur = document.body.dataset.theme;
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}

// ══════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════
function updateProgress() {
  const completed = getCompleted();
  const total = CURRICULUM.reduce((sum, w) => sum + w.days.length, 0);
  const count = Object.values(completed).filter(Boolean).length;
  const pct = (count / total) * 100;

  document.getElementById('progress-text').textContent = `${count} / ${total}`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const dot = document.getElementById('status-dot');
  dot.className = count === total ? 'status-dot complete' : 'status-dot';
}

// ══════════════════════════════════════════
// TOGGLE COMPLETE
// ══════════════════════════════════════════
function toggleComplete(event, dayId) {
  event.stopPropagation();
  const completed = getCompleted();
  completed[dayId] = !completed[dayId];
  saveCompleted(completed);

  const card = document.getElementById(`card-${dayId}`);
  const checkbox = document.getElementById(`chk-${dayId}`);
  if (card) card.classList.toggle('completed', !!completed[dayId]);
  if (checkbox) checkbox.checked = !!completed[dayId];

  if (activeDay && activeDay.day === dayId) {
    document.getElementById('det-checkbox').checked = !!completed[dayId];
  }
  updateProgress();
  renderBanner();
}

function toggleFromDetail() {
  if (!activeDay) return;
  const isChecked = document.getElementById('det-checkbox').checked;
  const completed = getCompleted();
  completed[activeDay.day] = isChecked;
  saveCompleted(completed);

  const card = document.getElementById(`card-${activeDay.day}`);
  const checkbox = document.getElementById(`chk-${activeDay.day}`);
  if (card) card.classList.toggle('completed', isChecked);
  if (checkbox) checkbox.checked = isChecked;
  updateProgress();
  renderBanner();
}

// ══════════════════════════════════════════
// WEEK TABS
// ══════════════════════════════════════════
function renderWeekNav() {
  const nav = document.getElementById('week-nav');
  nav.innerHTML = '';
  CURRICULUM.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (w.num === activeWeekNum ? ' active' : '');
    btn.style.setProperty('background', w.num === activeWeekNum ? w.color : '', 'important');
    btn.innerHTML = `<span class="week-tab-dot"></span>${w.label} — ${w.title.split(' ')[0]}`;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', w.num === activeWeekNum);
    btn.onclick = () => {
      activeWeekNum = w.num;
      activeDay = null;
      closeDetail(false);
      renderAll();
    };
    nav.appendChild(btn);
  });
}

// ══════════════════════════════════════════
// WEEK BANNER
// ══════════════════════════════════════════
function renderBanner() {
  const w = getActiveWeek();
  const completed = getCompleted();
  const weekCompleted = w.days.filter(d => completed[d.day]).length;
  const banner = document.getElementById('week-banner');
  banner.style.background = w.bg;
  banner.innerHTML = `
    <div class="week-banner-left">
      <div class="week-banner-title" style="color:${w.color}">Week ${w.num} — ${w.title}</div>
      <div class="week-banner-sub" style="color:${w.textDark}">${w.sub}</div>
      <span class="phase-label" style="margin-top:6px">${w.phase}</span>
    </div>
    <div class="week-banner-stats" style="color:${w.textDark}">
      <span>📅 7 Days</span>
      <span>✅ ${weekCompleted}/7 done</span>
    </div>
  `;
}

// ══════════════════════════════════════════
// DAY GRID
// ══════════════════════════════════════════
function renderGrid() {
  const w = getActiveWeek();
  const grid = document.getElementById('day-grid');
  const completed = getCompleted();
  grid.innerHTML = '';

  w.days.forEach(d => {
    const isComp = !!completed[d.day];
    const isActive = activeDay && activeDay.day === d.day;

    const card = document.createElement('div');
    card.id = `card-${d.day}`;
    card.className = `day-card${isComp ? ' completed' : ''}${isActive ? ' active' : ''}`;
    card.style.setProperty('--card-color', w.color);
    card.style.setProperty('--card-bg', w.bg);
    card.style.setProperty('--card-textDark', w.textDark);
    card.style.setProperty('--card-accent', w.color);

    card.innerHTML = `
      <div class="card-head">
        <div class="day-label">${d.label}</div>
        <input type="checkbox" id="chk-${d.day}" class="day-checkbox"
          ${isComp ? 'checked' : ''}
          onclick="toggleComplete(event, ${d.day})">
      </div>
      <div class="day-num">Day ${d.day}</div>
      <span class="topic-chip">${d.topic}</span>
      <div class="task-list">
        ${d.tasks.map(t => `<div class="task-item">${t}</div>`).join('')}
      </div>
    `;
    card.onclick = () => showDetail(d);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════
function showDetail(d) {
  const w = getActiveWeek();
  if (activeDay && activeDay.day === d.day) {
    closeDetail(true);
    return;
  }
  activeDay = d;

  const completed = getCompleted();
  document.getElementById('det-checkbox').checked = !!completed[d.day];
  document.getElementById('det-checkbox').style.setProperty('--card-color', w.color);
  document.getElementById('det-title').textContent = `Day ${d.day} — ${d.topic}`;
  document.getElementById('det-goal').textContent = d.goal;
  document.getElementById('det-code').textContent = d.code;
  document.getElementById('det-practice').innerHTML = d.practice.map(p => {
    let formatted = p;
    if (p.includes('(Easy)')) {
      formatted = p.replace('(Easy)', '<span class="badge easy">Easy</span>');
    } else if (p.includes('(Medium)')) {
      formatted = p.replace('(Medium)', '<span class="badge medium">Medium</span>');
    } else if (p.includes('(Hard)')) {
      formatted = p.replace('(Hard)', '<span class="badge hard">Hard</span>');
    }
    return `<div class="practice-item">${formatted}</div>`;
  }).join('');
  document.getElementById('det-tip-text').textContent = d.tip;

  // Apply week color to tip
  const tipBox = document.getElementById('det-tip');
  tipBox.style.borderLeftColor = w.color;

  document.getElementById('detail-panel').classList.add('visible');
  renderGrid(); // update card active state

  // Smooth scroll
  setTimeout(() => {
    document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function closeDetail(rerender = true) {
  activeDay = null;
  document.getElementById('detail-panel').classList.remove('visible');
  if (rerender) renderGrid();
}

// ══════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════
function renderAll() {
  renderWeekNav();
  renderBanner();
  renderGrid();
  updateProgress();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.onload = () => {
  initTheme();
  renderAll();
};

// ══════════════════════════════════════════
// LOGIN OVERLAY — EMAIL GATE
// ══════════════════════════════════════════

// Check if the user has already entered their email previously
window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('dsa_user_email')) {
    document.getElementById('login-overlay').style.display = 'none';
  }
});

// Function to send email to Formspree
function recordEmail() {
  const emailInput = document.getElementById('user-email').value;
  const btn = document.getElementById('start-btn');
  const loadingText = document.getElementById('loading-text');

  if (!emailInput || !emailInput.includes('@')) {
    alert("Please enter a valid email address.");
    return;
  }

  btn.disabled = true;
  btn.style.opacity = '0.5';
  loadingText.style.display = 'block';

  const FORMSPREE_URL = "https://formspree.io/f/mwvjezgq";

  fetch(FORMSPREE_URL, {
    method: 'POST',
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ 
      email: emailInput,
      accessedAt: new Date().toLocaleString()
    })
  })
  .then(response => {
    if (response.ok) {
      localStorage.setItem('dsa_user_email', emailInput);
      document.getElementById('login-overlay').style.display = 'none';
    } else {
      alert("There was an error recording your email. Please try again.");
      btn.disabled = false;
      btn.style.opacity = '1';
      loadingText.style.display = 'none';
    }
  })
  .catch(error => {
    alert("Network error. Please check your connection.");
    btn.disabled = false;
    btn.style.opacity = '1';
    loadingText.style.display = 'none';
  });
}
